<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stock & Inventory - Maddix Shop</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container" style="max-width: 1300px;">
    <nav class="navbar">
      <h2>📦 Stock & Inventory Control Center</h2>
      <div class="nav-user">
        <span class="coins-badge" style="background: var(--primary); color: white;">Inventory</span>
        <button class="btn btn-secondary btn-sm" onclick="window.location.href='/'">POS Terminal</button>
        <button class="btn btn-secondary btn-sm" onclick="window.location.href='/dashboard'">Dashboard</button>
        <button class="btn btn-secondary btn-sm" onclick="logout()">Logout</button>
      </div>
    </nav>

    <div class="stats-grid" style="grid-template-columns: 1fr; margin-bottom: 16px;">
      <div class="stat-card" style="display: flex; justify-content: space-between; align-items: center; padding: 16px 24px;">
        <div>
          <h2 style="margin-bottom: 4px;">Manage Products Catalog</h2>
          <p style="color: var(--text-muted); font-size: 14px;">Add products, update current prices, track low stock levels, and coordinate suppliers.</p>
        </div>
        <button class="btn btn-primary" onclick="openAddProductModal()" style="width: auto;">+ Add New Product</button>
      </div>
    </div>

    <!-- MAIN INVENTORY LIST -->
    <div class="section">
      <div style="display: flex; gap: 12px; margin-bottom: 20px;">
        <input type="text" id="inventory-search" oninput="filterInventory()" placeholder="🔍 Filter inventory by name or barcode SKU..." style="flex-grow: 1; padding: 12px 16px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text);">
        <select id="inventory-category-filter" onchange="filterInventory()" style="padding: 12px 16px; background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 8px;">
          <option value="all">All Categories</option>
          <option value="Grocery">Grocery</option>
          <option value="Beverages">Beverages</option>
          <option value="Electronics">Electronics</option>
          <option value="Apparel">Apparel</option>
        </select>
      </div>

      <div class="bot-list" id="inventory-products-list">
        <div class="empty-state">Loading stock files...</div>
      </div>
    </div>
  </div>

  <!-- ADD / EDIT PRODUCT MODAL -->
  <div class="modal-overlay" id="product-modal">
    <div class="modal" style="max-width: 500px;">
      <h2 id="product-modal-title">Add New Product</h2>
      <p style="color: var(--text-muted); font-size: 13px; margin-bottom: 16px;">Set SKU barcode and prices</p>
      
      <form id="product-form" onsubmit="saveProduct(event)">
        <input type="hidden" id="product-id">
        <div class="form-group">
          <label>Product Name</label>
          <input type="text" id="prod-name" required placeholder="Coca Cola 500ml">
        </div>
        <div class="form-group">
          <label>Barcode SKU</label>
          <input type="text" id="prod-sku" required placeholder="5000112630985">
        </div>
        <div class="form-group">
          <label>Category</label>
          <select id="prod-category" style="width: 100%; padding: 12px 16px; background: var(--input-bg); color: var(--text); border: 1px solid var(--border); border-radius: 8px;">
            <option value="Grocery">Grocery</option>
            <option value="Beverages">Beverages</option>
            <option value="Electronics">Electronics</option>
            <option value="Apparel">Apparel</option>
          </select>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
          <div class="form-group">
            <label>Cost Price (UGX)</label>
            <input type="number" id="prod-cost" required min="0" value="1000">
          </div>
          <div class="form-group">
            <label>Selling Price (UGX)</label>
            <input type="number" id="prod-selling" required min="0" value="1500">
          </div>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
          <div class="form-group">
            <label>Stock Quantity</label>
            <input type="number" id="prod-stock" required min="0" value="50">
          </div>
          <div class="form-group">
            <label>Low-Stock Threshold</label>
            <input type="number" id="prod-low-threshold" required min="0" value="10">
          </div>
        </div>
        <div class="form-group">
          <label>Supplier / Vendor</label>
          <input type="text" id="prod-supplier" value="Direct Purchase" placeholder="Century Bottling">
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" onclick="closeModal('product-modal')">Cancel</button>
          <button type="submit" class="btn btn-primary" id="btn-save-product">Save Product</button>
        </div>
      </form>
    </div>
  </div>

  <div class="toast-container"></div>

  <script src="js/app.js"></script>
</body>
</html>
